name: Update README

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8 AM UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Latest SourceForge Build
        run: |
          # Fetch latest SourceForge build name and date
          LATEST_BUILD=$(curl -s "https://sourceforge.net/projects/akky-builds/rss?path=/files/" | grep -oP '(?<=<title>)[^<]+' | head -n 1)
          UPLOAD_DATE=$(curl -s "https://sourceforge.net/projects/akky-builds/rss?path=/files/" | grep -oP '(?<=<pubDate>)[^<]+' | head -n 1)

          # XDA thread replies (placeholder, can be enhanced)
          XDA_REPLIES="50+"

          # Replace placeholders in README
          sed -i "s/PLACEHOLDER_BUILD/$LATEST_BUILD/" README.md
          sed -i "s/PLACEHOLDER_DATE/$UPLOAD_DATE/" README.md
          sed -i "s/PLACEHOLDER_XDA_REPLIES/$XDA_REPLIES/" README.md

      - name: Commit & Push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add README.md
          git commit -m 'Update latest SourceForge build & XDA info' || echo "No changes to commit"
          git push
